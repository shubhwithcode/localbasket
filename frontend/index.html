<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/config.js"></script>
  <base href="/" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="48x48" href="./favicon.png">
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="shortcut icon" href="./favicon.ico">
  <link rel="apple-touch-icon" href="./favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#ff8a1a">
  <title>Local Basket - Online Grocery Store in Mumbai</title>
  <meta name="description" content="Local Basket is an online grocery store offering fresh vegetables, fruits and daily essentials with fast delivery in Mumbai." />
  <noscript>
    <meta http-equiv="refresh" content="3;url=./welcome/customer/index.html" />
  </noscript>
  <style>
    :root {
      --bg-1: #ffffff;
      --bg-2: #fff7ed;
      --accent: #ff8a1a;
      --accent-2: #ffb347;
      --text: #0f172a;
      --muted: #475569;
      --card: rgba(255, 255, 255, 0.95);
      --card-border: rgba(15, 23, 42, 0.10);
      --shadow: 0 18px 50px -28px rgba(15, 23, 42, 0.25);
      --radius: 26px;
      --track: #e2e8f0;
      --px: 50%;
      --py: 35%;
      --rx: 0deg;
      --ry: 0deg;
      --parallax-x: 0px;
      --parallax-y: 0px;
      --parallax-x2: 0px;
      --parallax-y2: 0px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      position: relative;
      isolation: isolate;
      background:
        radial-gradient(1100px 720px at 50% 0%, rgba(255, 138, 26, 0.16), rgba(255, 138, 26, 0) 60%),
        radial-gradient(1000px 700px at 15% 100%, rgba(255, 179, 71, 0.14), rgba(255, 179, 71, 0) 62%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.2;
      background:
        radial-gradient(1200px 700px at 70% 35%, rgba(59,130,246,0.06), rgba(59,130,246,0) 60%);
      z-index: -3;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(820px 520px at 50% 28%, rgba(255, 138, 26, 0.08), rgba(255, 138, 26, 0) 72%),
        radial-gradient(920px 620px at 55% 38%, rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0) 72%);
      filter: blur(14px);
      opacity: 0.45;
      z-index: -2;
    }

    .bg-dots {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.26;
      background-image:
        linear-gradient(rgba(15,23,42,0.06) 1px, rgba(15,23,42,0) 1px),
        linear-gradient(90deg, rgba(15,23,42,0.06) 1px, rgba(15,23,42,0) 1px),
        linear-gradient(rgba(15,23,42,0.035) 1px, rgba(15,23,42,0) 1px),
        linear-gradient(90deg, rgba(15,23,42,0.035) 1px, rgba(15,23,42,0) 1px);
      background-size: 76px 76px, 76px 76px, 22px 22px, 22px 22px;
      background-position: 0 0, 0 0, 10px 10px, 10px 10px;
      mask-image: radial-gradient(80% 70% at 50% 35%, #000 55%, transparent 78%);
      z-index: -2;
      translate: var(--parallax-x2) var(--parallax-y2);
    }

    .bg-blob {
      position: fixed;
      inset: -20%;
      pointer-events: none;
      opacity: 0.38;
      filter: blur(58px);
      transform: translate3d(0,0,0);
      translate: var(--parallax-x) var(--parallax-y);
      background:
        radial-gradient(closest-side, rgba(255, 138, 26, 0.22), rgba(255, 138, 26, 0) 70%),
        radial-gradient(closest-side, rgba(255, 179, 71, 0.18), rgba(255, 179, 71, 0) 72%),
        radial-gradient(closest-side, rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0) 70%);
      animation: blobDrift 10s ease-in-out infinite;
      z-index: -1;
    }

    .launch-card {
      width: min(640px, calc(100vw - 28px));
      border-radius: var(--radius);
      padding: 0;
      background: transparent;
      text-align: center;
      animation: cardIn 0.55s ease both;
      position: relative;
      overflow: hidden;
      transition: transform 180ms ease, box-shadow 180ms ease;
      z-index: 1;
    }

    .launch-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 44px -22px rgba(15, 23, 42, 0.28);
    }

    .card-surface {
      position: relative;
      border-radius: var(--radius);
      padding: 42px 34px 28px;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 138, 26, 0.14);
      box-shadow: var(--shadow);
      overflow: hidden;
      transform: perspective(900px) rotateX(var(--rx)) rotateY(var(--ry)) translateZ(0);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .launch-card:hover .card-surface {
      transform: translateY(-1px);
      box-shadow: 0 22px 60px -32px rgba(15, 23, 42, 0.26);
    }

    .card-surface::before {
      content: "";
      position: absolute;
      inset: 0;
      padding: 1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255, 138, 26, 0.35), rgba(255, 255, 255, 0.9), rgba(255, 138, 26, 0.18));
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.9;
    }

    .card-surface::after {
      content: "";
      position: absolute;
      inset: -1px;
      pointer-events: none;
      background:
        radial-gradient(90% 70% at 20% 0%, rgba(255, 179, 71, 0.18), rgba(255, 179, 71, 0) 62%),
        radial-gradient(80% 60% at 85% 100%, rgba(255, 138, 26, 0.10), rgba(255, 138, 26, 0) 62%),
        radial-gradient(220px 160px at var(--px) var(--py), rgba(255, 138, 26, 0.12), rgba(255, 138, 26, 0) 72%);
      opacity: 0.7;
    }

    .launch-card::before {
      content: "";
      position: absolute;
      inset: -1px;
      background: radial-gradient(120% 90% at 50% 0%, rgba(255, 138, 26, 0.06), rgba(255, 138, 26, 0) 60%);
      pointer-events: none;
    }

    .content {
      position: relative;
    }

    .logo-wrap {
      width: 132px;
      height: 132px;
      margin: 0 auto 18px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 138, 26, 0.16);
      background:
        radial-gradient(closest-side, rgba(255,255,255,0.96), rgba(255,255,255,0.72)),
        radial-gradient(closest-side, rgba(255, 138, 26, 0.10), rgba(255, 138, 26, 0) 70%);
      box-shadow: 0 26px 70px -44px rgba(15, 23, 42, 0.55);
      animation: floaty 2.35s ease-in-out infinite;
      transition: transform 180ms ease, box-shadow 180ms ease;
      position: relative;
    }

    .logo-wrap::before {
      content: "";
      position: absolute;
      inset: -12px;
      border-radius: 999px;
      border: 2px solid rgba(255, 138, 26, 0.12);
      opacity: 0.9;
      animation: orbit 4.8s linear infinite;
      pointer-events: none;
    }

    .logo-wrap::after {
      content: "";
      position: absolute;
      inset: -18px;
      border-radius: 999px;
      background: radial-gradient(closest-side, rgba(255, 138, 26, 0.18), rgba(255, 138, 26, 0) 65%);
      filter: blur(10px);
      opacity: 0.9;
      pointer-events: none;
      z-index: -1;
    }

    .launch-card:hover .logo-wrap {
      transform: translateY(-1px) rotate(-0.8deg);
      box-shadow: 0 18px 44px -28px rgba(15, 23, 42, 0.38);
    }

    .logo-wrap img {
      width: 62px;
      height: 62px;
      object-fit: cover;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      filter: drop-shadow(0 0 16px rgba(255, 165, 0, 0.38));
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 7.5vw, 52px);
      letter-spacing: 3px;
      line-height: 1.05;
      color: #0f172a;
      font-weight: 800;
      text-transform: uppercase;
      background: linear-gradient(180deg, #0f172a, #334155);
      background-size: 100% 180%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
    }

    .content p {
      max-width: 44ch;
      margin-left: auto;
      margin-right: auto;
    }

    .tip {
      margin-top: 8px;
      font-size: 13px;
      color: rgba(71, 85, 105, 0.92);
      font-weight: 700;
      min-height: 18px;
    }

    .mini-loader {
      margin: 18px auto 0;
      width: fit-content;
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: flex-end;
    }

    .mini-loader span {
      width: 6px;
      height: 16px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 138, 26, 0.95), rgba(255, 179, 71, 0.75));
      box-shadow: 0 10px 22px -18px rgba(255, 138, 26, 0.95);
      animation: miniBounce 0.9s ease-in-out infinite;
    }

    .mini-loader span:nth-child(2) { animation-delay: 0.12s; height: 20px; }
    .mini-loader span:nth-child(3) { animation-delay: 0.24s; height: 14px; }

    .steps {
      margin: 14px auto 0;
      width: min(420px, 92%);
      display: grid;
      gap: 8px;
      text-align: left;
    }

    .step {
      display: grid;
      grid-template-columns: 18px 1fr;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(15, 23, 42, 0.08);
      color: #0f172a;
      font-weight: 800;
      font-size: 13px;
      box-shadow: 0 14px 30px -24px rgba(15, 23, 42, 0.25);
      opacity: 0.92;
      transform: translateY(0);
      transition: opacity 200ms ease, transform 200ms ease, filter 200ms ease;
    }

    .step::before {
      content: "";
      width: 18px;
      height: 18px;
      border-radius: 8px;
      background: rgba(148, 163, 184, 0.35);
      border: 1px solid rgba(148, 163, 184, 0.55);
      box-shadow: 0 10px 18px -14px rgba(15, 23, 42, 0.35);
    }

    .step.is-active {
      opacity: 1;
      transform: translateY(-1px);
      filter: saturate(1.05);
    }

    .step.is-done {
      opacity: 1;
    }

    .step.is-done::before {
      background: rgba(255, 138, 26, 0.16);
      border-color: rgba(255, 138, 26, 0.42);
      position: relative;
    }

    .step.is-done::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 11px;
      border-right: 2px solid #b45309;
      border-bottom: 2px solid #b45309;
      transform: translateX(4px) rotate(45deg);
      opacity: 0.95;
      pointer-events: none;
    }

    .pills {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .pill {
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      color: #0f172a;
      background: rgba(255, 138, 26, 0.10);
      border: 1px solid rgba(255, 138, 26, 0.18);
      user-select: none;
      white-space: nowrap;
    }

    @media (max-width: 520px) {
      .pills { display: none; }
    }

    .progress {
      margin: 18px auto 10px;
      width: min(360px, 92%);
      height: 8px;
      border-radius: 999px;
      background: #f1f5f9;
      border: 1px solid rgba(15, 23, 42, 0.08);
      overflow: hidden;
      position: relative;
    }

    .progress > .bar {
      position: absolute;
      inset: 0;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ff8c00, #ffb347);
      box-shadow: 0 10px 24px -18px rgba(255, 138, 26, 0.55);
      transition: width 80ms linear;
    }

    .progress::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 40%;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.55), rgba(255,255,255,0));
      transform: translateX(-120%);
      animation: sheen 1.35s ease-in-out infinite;
      pointer-events: none;
    }

    .fallback {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 30px;
      min-height: 46px;
      padding: 12px 28px;
      border: 0;
      background: linear-gradient(135deg, #ff8c00, #ffa726);
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      box-shadow: 0 20px 40px -28px rgba(255, 138, 26, 0.75);
      transition: transform 120ms ease, filter 120ms ease;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .fallback span {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .fallback span::after {
      content: "->";
      font-weight: 900;
      opacity: 0.95;
      transform: translateX(0);
      transition: transform 160ms ease;
    }

    .fallback:hover span::after {
      transform: translateX(3px);
    }

    .fallback::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.35), rgba(255,255,255,0));
      transform: translateX(-120%) skewX(-14deg);
      transition: transform 420ms ease;
      opacity: 0.75;
      z-index: 0;
      pointer-events: none;
    }

    .fallback:hover::before {
      transform: translateX(140%) skewX(-14deg);
    }

    .fallback:hover { transform: scale(1.05); filter: brightness(1.05); }
    .fallback:active { transform: translateY(0); }
    .fallback:focus-visible { outline: none; box-shadow: 0 0 0 4px rgba(255, 138, 26, 0.28), 0 20px 40px -28px rgba(255, 138, 26, 0.75); }

    .ripple {
      position: absolute;
      border-radius: 999px;
      transform: scale(0);
      opacity: 0.55;
      background: rgba(255, 255, 255, 0.65);
      animation: ripple 520ms ease-out forwards;
      pointer-events: none;
      z-index: 0;
    }

    .countdown {
      font-size: 12px;
      color: var(--muted);
    }

    .meta {
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-weight: 800;
    }

    .pct {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 138, 26, 0.10);
      border: 1px solid rgba(255, 138, 26, 0.18);
      color: #9a3412;
      letter-spacing: 0.2px;
      min-width: 44px;
      text-align: center;
      user-select: none;
    }

    .footer-line {
      margin-top: 14px;
      font-size: 12px;
      color: rgba(100, 116, 139, 0.9);
      font-weight: 700;
    }

    @keyframes sheen {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }

    @keyframes ripple {
      from { transform: scale(0); opacity: 0.55; }
      to { transform: scale(1); opacity: 0; }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-3px); }
    }

    @keyframes orbit {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes blobDrift {
      0% { transform: translate3d(-2%, -2%, 0) rotate(0deg); }
      50% { transform: translate3d(2.5%, 2%, 0) rotate(6deg); }
      100% { transform: translate3d(-2%, -2%, 0) rotate(0deg); }
    }

    @keyframes pulseDot {
      0%, 100% { box-shadow: 0 0 0 4px rgba(255, 138, 26, 0.16); transform: scale(1); }
      50% { box-shadow: 0 0 0 7px rgba(255, 138, 26, 0.10); transform: scale(1.08); }
    }

    @keyframes miniBounce {
      0%, 100% { transform: translateY(0); opacity: 0.75; }
      50% { transform: translateY(-6px); opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .launch-card { animation: none; }
      .card-surface { transition: none; }
      .logo-wrap { animation: none; }
      .logo-wrap::before { animation: none; }
      .progress::after { animation: none; }
      .progress > .bar { transition: none; }
      .fallback { transition: none; }
      .badge i { animation: none; }
      .mini-loader span { animation: none; }
      .bg-blob { animation: none; }
      .launch-card { transition: none; }
      .logo-wrap { transition: none; }
      .bg-dots { translate: 0px 0px; }
      .bg-blob { translate: 0px 0px; }
    }
  </style>
</head>
<body>
  <div class="bg-blob" aria-hidden="true"></div>
  <div class="bg-dots" aria-hidden="true"></div>
  <main class="launch-card" id="launchCard" role="status" aria-live="polite">
    <div class="card-surface">
    <div class="content">
      <div class="logo-wrap">
        <img src="./welcome/logo2.png?v=20260303" alt="LocalBasket logo" />
      </div>
      <h1>LocalBasket</h1>
      <p>Launching your local grocery marketplace</p>
      <p class="tip" id="tip" aria-hidden="true">Fresh picks, delivered fast.</p>
      <div class="mini-loader" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <a class="fallback" id="enterBtn" href="./welcome/customer/index.html"><span>Enter Marketplace</span></a>
      <div class="meta">
        <span class="countdown" id="countdown">Redirecting in 3s...</span>
        <span class="pct" id="pct" aria-hidden="true">0%</span>
      </div>
      <div class="footer-line">Serving your neighborhood with fresh groceries</div>
    </div>
    </div>
  </main>
  <script>
    const target = (() => {
      const path = String(window.location.pathname || "").replace(/\\/g, "/");
      return path.includes("/frontend/")
        ? "/frontend/welcome/customer/index.html"
        : "./welcome/customer/index.html";
    })();
    const card = document.getElementById("launchCard");
    const enterBtn = document.getElementById("enterBtn");
    const countdownEl = document.getElementById("countdown");
    const tipEl = document.getElementById("tip");
    const surface = document.querySelector(".card-surface");
    const pctEl = document.getElementById("pct");
    if (enterBtn) enterBtn.href = target;

    // Prevent in-page "launch overlays" (e.g. from `js/include.js`) so users don't
    // experience a second launch screen after redirect.
    try { sessionStorage.setItem("lbLaunchSeen", "1"); } catch {}

    const durationMs = 3000;
    const startedAt = performance.now();
    let remaining = 3;

    const prefersReduce = (() => {
      try { return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches; } catch { return false; }
    })();

    // Background parallax (very subtle)
    if (!prefersReduce) {
      let px = 0;
      let py = 0;
      let tx = 0;
      let ty = 0;
      let raf = 0;

      const tickParallax = () => {
        raf = 0;
        px += (tx - px) * 0.12;
        py += (ty - py) * 0.12;
        document.documentElement.style.setProperty("--parallax-x", `${px.toFixed(2)}px`);
        document.documentElement.style.setProperty("--parallax-y", `${py.toFixed(2)}px`);
        document.documentElement.style.setProperty("--parallax-x2", `${(px * 0.6).toFixed(2)}px`);
        document.documentElement.style.setProperty("--parallax-y2", `${(py * 0.6).toFixed(2)}px`);
      };

      const onMove = (ev) => {
        const vw = Math.max(1, window.innerWidth || 1);
        const vh = Math.max(1, window.innerHeight || 1);
        const nx = (ev.clientX / vw - 0.5) * 2;
        const ny = (ev.clientY / vh - 0.5) * 2;
        tx = Math.max(-1, Math.min(1, nx)) * 10;
        ty = Math.max(-1, Math.min(1, ny)) * 10;
        if (!raf) raf = requestAnimationFrame(tickParallax);
      };

      window.addEventListener("pointermove", onMove, { passive: true });
    }

    if (card && !prefersReduce) {
      const setPointerGlow = (ev) => {
        const rect = card.getBoundingClientRect();
        const x = Math.max(0, Math.min(rect.width, ev.clientX - rect.left));
        const y = Math.max(0, Math.min(rect.height, ev.clientY - rect.top));
        card.style.setProperty("--px", `${Math.round(x)}px`);
        card.style.setProperty("--py", `${Math.round(y)}px`);
      };
      card.addEventListener("pointermove", setPointerGlow, { passive: true });
      card.addEventListener("pointerleave", () => {
        card.style.setProperty("--px", "50%");
        card.style.setProperty("--py", "35%");
      }, { passive: true });
    }

    if (surface && card && !prefersReduce) {
      const setTilt = (ev) => {
        const rect = card.getBoundingClientRect();
        const dx = (ev.clientX - rect.left) / rect.width - 0.5;
        const dy = (ev.clientY - rect.top) / rect.height - 0.5;
        const ry = Math.max(-6, Math.min(6, dx * 10));
        const rx = Math.max(-6, Math.min(6, -dy * 10));
        surface.style.setProperty("--rx", `${rx.toFixed(2)}deg`);
        surface.style.setProperty("--ry", `${ry.toFixed(2)}deg`);
      };
      card.addEventListener("pointermove", setTilt, { passive: true });
      card.addEventListener("pointerleave", () => {
        surface.style.setProperty("--rx", "0deg");
        surface.style.setProperty("--ry", "0deg");
      }, { passive: true });
    }

    if (enterBtn && !prefersReduce) {
      enterBtn.addEventListener("click", (ev) => {
        const rect = enterBtn.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height) * 1.15;
        const ripple = document.createElement("span");
        ripple.className = "ripple";
        ripple.style.width = `${Math.round(size)}px`;
        ripple.style.height = `${Math.round(size)}px`;
        ripple.style.left = `${Math.round(ev.clientX - rect.left - size / 2)}px`;
        ripple.style.top = `${Math.round(ev.clientY - rect.top - size / 2)}px`;
        enterBtn.appendChild(ripple);
        window.setTimeout(() => ripple.remove(), 650);
      });
    }

    if (tipEl && !prefersReduce && false) {
      const tips = [
        "Fresh picks, delivered fast",
        "Veggies • Fruits • Daily essentials",
        "Secure checkout and easy returns",
      ];
      let tipIndex = 0;
      window.setInterval(() => {
        tipIndex = (tipIndex + 1) % tips.length;
        tipEl.style.opacity = "0";
        window.setTimeout(() => {
          tipEl.textContent = tips[tipIndex];
          tipEl.style.opacity = "1";
        }, 160);
      }, 1200);
    }

    // Tip rotator (ASCII-safe)
    if (tipEl && !prefersReduce) {
      const tips = [
        "Fresh picks, delivered fast",
        "Veggies - Fruits - Daily essentials",
        "Secure checkout and easy returns",
        "Made for a smooth mobile experience",
      ];
      let tipIndex = 0;
      window.setInterval(() => {
        tipIndex = (tipIndex + 1) % tips.length;
        tipEl.style.opacity = "0";
        window.setTimeout(() => {
          tipEl.textContent = tips[tipIndex];
          tipEl.style.opacity = "1";
        }, 160);
      }, 1600);
    }

    const tick = () => {
      if (!countdownEl) return;
      countdownEl.textContent = `Redirecting in ${remaining}s...`;
    };

    tick();
    const interval = setInterval(() => {
      remaining -= 1;
      if (remaining <= 0) {
        clearInterval(interval);
        window.location.replace(target);
        return;
      }
      tick();
    }, 1000);

    const animate = () => {
      const elapsed = performance.now() - startedAt;
      const t01 = Math.max(0, Math.min(1, elapsed / durationMs));
      if (pctEl) pctEl.textContent = `${Math.round(t01 * 100)}%`;
      if (t01 < 1) requestAnimationFrame(animate);
    };
    requestAnimationFrame(animate);

    // Keyboard: Enter triggers the primary action
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && enterBtn) enterBtn.click();
    });
  </script>
</body>
</html>
