<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var path = String(window.location.pathname || "").replace(/\\/g, "/");
      var basePath = path.indexOf("/frontend/") !== -1 ? "/frontend/" : "/";
      var baseEl = document.createElement("base");
      baseEl.href = basePath;
      document.head.appendChild(baseEl);
      window.LB_BASE_PATH = basePath.replace(/\/$/, "");
    })();
  </script>
  <script src="js/config.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout | LocalBasket</title>

  <link rel="stylesheet" href="css/header-footer.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="./welcome/logo2.png?v=20260303" />

  <style>
    :root {
      --co-primary: #ff8a1a;
      --co-primary-dark: #e56a00;
      --co-bg: #f6faf9;
      --co-card: #ffffff;
      --co-text: #0f172a;
      --co-muted: #64748b;
      --co-border: #dbe9e6;
      --co-shadow: 0 18px 35px -20px rgba(15, 118, 110, 0.35);
      --co-radius: 18px;
    }

    * {
      box-sizing: border-box;
      font-family: "Plus Jakarta Sans", sans-serif;
    }

    body {
      margin: 0;
      background: var(--co-bg);
      color: var(--co-text);
    }

    .checkout-shell {
      max-width: 1200px;
      margin: 22px auto 40px;
      padding: 0 18px;
    }

    .checkout-title {
      margin: 6px 0 16px;
      font-size: clamp(24px, 3vw, 34px);
      font-weight: 800;
      letter-spacing: -0.8px;
    }

    .checkout-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(320px, 1fr);
      gap: 18px;
      align-items: start;
    }

    .co-card {
      background: var(--co-card);
      border: 1px solid var(--co-border);
      border-radius: var(--co-radius);
      box-shadow: var(--co-shadow);
      padding: 18px;
    }

    .co-badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 999px;
      background: #e5f7f4;
      color: var(--co-primary);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .field-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--co-muted);
      margin-bottom: 6px;
      display: block;
    }

    .co-input,
    .co-textarea,
    .co-select {
      width: 100%;
      border: 1px solid #d2e4e0;
      border-radius: 12px;
      background: #ffffff;
      padding: 12px 14px;
      margin-bottom: 14px;
      font-size: 14px;
      color: var(--co-text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .co-textarea {
      resize: vertical;
      min-height: 90px;
    }

    .co-input:focus,
    .co-textarea:focus,
    .co-select:focus {
      border-color: var(--co-primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    #orderItems {
      margin-bottom: 8px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 14px;
      padding: 8px 0;
      border-bottom: 1px dashed #e2eeeb;
    }

    .cart-item:last-child {
      border-bottom: 0;
    }

    .empty {
      color: var(--co-muted);
      font-size: 14px;
      text-align: center;
      padding: 10px 0;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      margin-top: 8px;
      color: #334155;
    }

    .total-grand {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #d7e6e2;
      font-size: 18px;
      font-weight: 800;
      color: #0b3f3a;
    }

    .checkout-btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      background: var(--co-primary);
      color: #ffffff;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 14px;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .checkout-btn:hover {
      background: var(--co-primary-dark);
      transform: translateY(-1px);
    }

    .co-confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(3px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 5500;
      padding: 16px;
    }

    .co-confirm-box {
      width: min(94vw, 430px);
      background: #fff;
      border: 1px solid #d7e7e4;
      border-radius: 18px;
      box-shadow: 0 24px 44px -20px rgba(15, 23, 42, 0.45);
      padding: 18px;
      animation: coPopIn 0.2s ease;
    }

    .co-confirm-title {
      margin: 0 0 8px;
      font-size: 21px;
      font-weight: 800;
      color: #0f172a;
    }

    .co-confirm-text {
      margin: 0;
      color: #475569;
      font-size: 14px;
      line-height: 1.5;
    }

    .co-confirm-actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .co-confirm-btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .co-confirm-btn.cancel {
      background: #f1f5f9;
      color: #334155;
    }

    .co-confirm-btn.ok {
      background: var(--co-primary);
      color: #fff;
    }

    .co-confirm-btn.ok:hover {
      background: var(--co-primary-dark);
    }

    /* Page background + footer seam fix */
    body.lb-with-footer #siteFooter {
      margin-top: 0 !important;
    }
    body.lb-with-footer #siteFooter .lb-footer-pro {
      margin-top: 0 !important;
    }
    html.lb-theme-dark body {
      background: #071531 !important;
    }
    html.lb-theme-dark .checkout-shell {
      background: transparent;
    }
    html.lb-theme-dark .co-card {
      background: linear-gradient(165deg, #0f1c31, #14233c);
      border-color: rgba(148, 163, 184, 0.3);
      box-shadow: 0 18px 34px -22px rgba(2, 6, 23, 0.85);
    }
    html.lb-theme-dark .co-badge {
      background: rgba(255, 138, 26, 0.14);
      color: #ffd29f;
      border: 1px solid rgba(255, 186, 114, 0.38);
    }
    html.lb-theme-dark .field-label {
      color: #9eb0ca;
    }
    html.lb-theme-dark .co-input,
    html.lb-theme-dark .co-textarea,
    html.lb-theme-dark .co-select {
      background: #0f1c31;
      color: #e2e8f0;
      border-color: rgba(148, 163, 184, 0.3);
    }
    html.lb-theme-dark .co-input::placeholder,
    html.lb-theme-dark .co-textarea::placeholder {
      color: #8ea1bd;
    }
    html.lb-theme-dark .co-input:focus,
    html.lb-theme-dark .co-textarea:focus,
    html.lb-theme-dark .co-select:focus {
      border-color: #ff8a1a;
      box-shadow: 0 0 0 3px rgba(255, 138, 26, 0.16);
    }
    html.lb-theme-dark .cart-item {
      border-bottom-color: rgba(148, 163, 184, 0.28);
      color: #dbe7fb;
    }
    html.lb-theme-dark .empty {
      color: #9eb0ca;
    }
    html.lb-theme-dark .total-row {
      color: #a9b9d1;
    }
    html.lb-theme-dark .total-row span:last-child {
      color: #c8d7ee;
      font-weight: 700;
    }
    html.lb-theme-dark .total-grand {
      color: #ffd29f;
      border-top-color: rgba(148, 163, 184, 0.32);
    }
    html.lb-theme-dark .total-grand span:last-child {
      color: #ffb866;
      font-weight: 800;
    }
    html.lb-theme-dark .checkout-btn {
      background: linear-gradient(135deg, #ff8a1a, #fb923c);
      color: #ffffff;
    }
    html.lb-theme-dark .checkout-btn:hover {
      background: linear-gradient(135deg, #fb923c, #ff8a1a);
    }
    html.lb-theme-dark .co-confirm-overlay {
      background: rgba(2, 6, 23, 0.72);
    }
    html.lb-theme-dark .co-confirm-box {
      background: linear-gradient(165deg, #0f1c31, #14233c);
      border-color: rgba(148, 163, 184, 0.3);
      color: #e2e8f0;
    }
    html.lb-theme-dark .co-confirm-title {
      color: #f8fafc;
    }
    html.lb-theme-dark .co-confirm-text {
      color: #a9b9d1;
    }
    html.lb-theme-dark .co-confirm-btn.cancel {
      background: #12223a;
      color: #dbe7fb;
      border: 1px solid rgba(148, 163, 184, 0.3);
    }
    html.lb-theme-dark .co-confirm-btn.ok {
      background: linear-gradient(135deg, #ff8a1a, #fb923c);
      color: #fff;
    }

    @keyframes coPopIn {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 980px) {
      .checkout-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .mobile-loc-row {
        padding: 0 12px 10px;
      }
      .mobile-loc-btn {
        min-width: 0;
        overflow: hidden;
        padding: 7px 9px;
      }
      #locTextMobile {
        min-width: 0;
        max-width: 100%;
        font-size: 12px;
      }
      #locTextMobile .lb-loc-marquee-track {
        will-change: auto;
      }

      .checkout-shell {
        margin-top: 8px;
        padding: 0 10px calc(128px + env(safe-area-inset-bottom));
      }
      .checkout-title {
        margin: 4px 0 12px;
        font-size: 30px;
      }
      .checkout-grid {
        gap: 12px;
      }

      .co-card {
        padding: 14px;
        border-radius: 16px;
      }
      .co-badge {
        margin-bottom: 10px;
      }
      .co-input,
      .co-textarea,
      .co-select {
        margin-bottom: 12px;
        border-radius: 11px;
        padding: 11px 12px;
        font-size: 16px;
      }
      .field-label {
        margin-bottom: 5px;
        font-size: 12px;
      }
      .checkout-btn {
        min-height: 50px;
        border-radius: 12px;
      }
    }
  </style>
</head>
<body>

  <div id="header"></div>
  <div id="siteHeader"></div>

  <main class="checkout-shell">
    <h1 class="checkout-title">Checkout</h1>

    <section class="checkout-grid">
      <article class="co-card">
        <span class="co-badge">Delivery Details</span>

        <label class="field-label" for="name">Full Name *</label>
        <input id="name" class="co-input" type="text" placeholder="Enter full name" />

        <label class="field-label" for="phone">Mobile Number *</label>
        <input id="phone" class="co-input" type="tel" inputmode="numeric" autocomplete="tel"
               placeholder="Mobile number (10-digit or +91)" maxlength="16" />

        <label class="field-label" for="address">Full Address *</label>
        <textarea id="address" class="co-textarea" placeholder="House no, building, street"></textarea>

        <label class="field-label" for="area">Area / Locality</label>
        <input id="area" class="co-input" type="text" placeholder="Area" />

        <label class="field-label" for="pincode">Pincode *</label>
        <input id="pincode" class="co-input" type="text" placeholder="6-digit pincode" maxlength="6" />

        <span class="co-badge">Payment Method</span>
        <select id="payment" class="co-select">
          <option value="COD">Cash on Delivery</option>
          <option value="ONLINE">UPI / Card</option>
        </select>
      </article>

      <aside class="co-card">
        <span class="co-badge">Order Summary</span>

        <div id="orderItems">
          <p class="empty">Loading cart...</p>
        </div>

        <div class="total-row">
          <span>Items Total</span>
          <span id="itemsTotal">Rs. 0</span>
        </div>
        <div class="total-row">
          <span>Delivery Fee</span>
          <span id="deliveryFee">Rs. 0</span>
        </div>
        <div class="total-row">
          <span>GST (5%)</span>
          <span id="gstFee">Rs. 0</span>
        </div>
        <div class="total-row total-grand">
          <span>Total Payable</span>
          <span id="grandTotal">Rs. 0</span>
        </div>

        <button id="checkoutActionBtn" class="checkout-btn" onclick="placeOrder()">Place Order</button>
      </aside>
    </section>
  </main>

  <div id="siteFooter"></div>

  <div class="co-confirm-overlay" id="confirmOverlay">
    <div class="co-confirm-box" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmText">
      <h3 class="co-confirm-title" id="confirmTitle">Confirm Order</h3>
      <p class="co-confirm-text" id="confirmText">Do you want to place this order?</p>
      <div class="co-confirm-actions">
        <button class="co-confirm-btn cancel" type="button" id="confirmCancel">Cancel</button>
        <button class="co-confirm-btn ok" type="button" id="confirmOk">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    window.LB_BRAND_LOGO_URL = "https://localbasket.co.in/welcome/logo2.png?v=20260303";
  </script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="/welcome/customer/checkout/checkout-fixed.js?v=20260311d"></script>
  <div id="footer"></div>
  <script src="/js/include.js?v=20260313a"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/theme.js"></script>
</body>
</html>
