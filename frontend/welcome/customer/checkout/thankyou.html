<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var path = String(window.location.pathname || "").replace(/\\/g, "/");
      var basePath = path.indexOf("/frontend/") !== -1 ? "/frontend/" : "/";
      var baseEl = document.createElement("base");
      baseEl.href = basePath;
      document.head.appendChild(baseEl);
      window.LB_BASE_PATH = basePath.replace(/\/$/, "");
    })();
  </script>
  <script src="js/config.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Order Confirmed | LocalBasket</title>

  <link rel="stylesheet" href="css/header-footer.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="./welcome/logo2.png?v=20260303" />

  <style>
    :root {
      --ty-primary: #ff8a1a;
      --ty-primary-dark: #e56a00;
      --ty-bg: #f4faf9;
      --ty-card: #ffffff;
      --ty-text: #0f172a;
      --ty-muted: #64748b;
      --ty-border: #dcebe8;
      --ty-shadow: 0 26px 44px -26px rgba(15, 118, 110, 0.45);
    }

    * {
      box-sizing: border-box;
      font-family: "Plus Jakarta Sans", sans-serif;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at 15% 10%, rgba(15, 118, 110, 0.08) 0%, var(--ty-bg) 45%);
      color: var(--ty-text);
    }
    html.lb-theme-dark body {
      background: #071531 !important;
      color: #dbe7fb;
    }
    html.lb-theme-dark .ty-card {
      background: linear-gradient(165deg, #0f1c31, #14233c);
      border-color: rgba(148, 163, 184, 0.34);
      box-shadow: 0 20px 34px -24px rgba(2, 6, 23, 0.96);
    }
    html.lb-theme-dark .ty-sub {
      color: #a9b9d1;
    }
    html.lb-theme-dark .ty-pill {
      background: rgba(255, 138, 26, 0.14);
      border-color: rgba(255, 186, 114, 0.44);
      color: #ffd29f;
    }

    .ty-shell {
      min-height: calc(100vh - 170px);
      display: grid;
      place-items: center;
      padding: 24px 16px 40px;
      animation: tyFadeIn 0.45s ease;
    }

    .ty-card {
      width: min(560px, 100%);
      background: var(--ty-card);
      border: 1px solid var(--ty-border);
      border-radius: 24px;
      box-shadow: var(--ty-shadow);
      padding: 26px 24px;
      text-align: center;
      animation: tyCardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .ty-icon {
      width: 78px;
      height: 78px;
      border-radius: 999px;
      margin: 0 auto 14px;
      display: grid;
      place-items: center;
      font-size: 36px;
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      border: 1px solid #86efac;
      color: #16a34a;
      animation: tyIconPop 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .ty-title {
      margin: 0;
      font-size: clamp(26px, 3vw, 34px);
      font-weight: 800;
      letter-spacing: -0.6px;
      line-height: 1.15;
    }

    .ty-sub {
      margin: 10px auto 0;
      max-width: 460px;
      color: var(--ty-muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .ty-pill-row {
      margin: 16px 0 2px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .ty-pill {
      display: inline-flex;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      color: var(--ty-primary);
      background: #e7f7f4;
      border: 1px solid #c7ebe4;
      opacity: 0;
      transform: translateY(6px);
      animation: tyPillIn 0.4s ease forwards;
    }
    .ty-pill:nth-child(1) { animation-delay: 0.18s; }
    .ty-pill:nth-child(2) { animation-delay: 0.28s; }

    .ty-actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: tyFadeIn 0.35s ease forwards;
      animation-delay: 0.33s;
    }

    .ty-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .ty-btn.primary {
      background: var(--ty-primary);
      color: #fff;
      box-shadow: 0 10px 18px -12px rgba(15, 118, 110, 0.5);
    }

    .ty-btn.primary:hover {
      background: var(--ty-primary-dark);
      transform: translateY(-1px);
    }

    .ty-btn.ghost {
      background: #ffffff;
      color: var(--ty-text);
      border: 1px solid #dbe7e5;
    }

    .ty-btn.ghost:hover {
      transform: translateY(-1px);
      background: #f8fafc;
    }
    html.lb-theme-dark .ty-btn.ghost {
      background: #12223a;
      color: #dbe7fb;
      border-color: rgba(148, 163, 184, 0.32);
    }
    html.lb-theme-dark .ty-btn.ghost:hover {
      background: #172b49;
    }

    @keyframes tyFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes tyCardIn {
      from { opacity: 0; transform: translateY(14px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes tyIconPop {
      0% { transform: scale(0.85); opacity: 0; }
      70% { transform: scale(1.06); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes tyPillIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .ty-shell {
        min-height: auto;
        padding: 12px 12px calc(118px + env(safe-area-inset-bottom));
        align-content: start;
      }

      .ty-card {
        width: 100%;
        border-radius: 18px;
        padding: 18px 14px;
      }
      .ty-icon {
        width: 68px;
        height: 68px;
        font-size: 30px;
        margin-bottom: 12px;
      }
      .ty-title {
        font-size: 26px;
        line-height: 1.12;
      }

      .ty-sub {
        font-size: 13px;
        line-height: 1.45;
      }
      .ty-pill-row {
        margin-top: 14px;
        gap: 7px;
      }
      .ty-pill {
        padding: 6px 10px;
        font-size: 11px;
      }

      .ty-actions {
        flex-direction: column;
        margin-top: 16px;
      }

      .ty-btn {
        width: 100%;
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      #siteFooter {
        display: none !important;
      }
    }
  </style>
</head>
<body>

  <div id="header"></div>
  <div id="siteHeader"></div>

  <main class="ty-shell">
    <section class="ty-card">
      <div class="ty-icon" aria-hidden="true">&#10003;</div>
      <h1 class="ty-title">Order Placed Successfully</h1>
      <p class="ty-sub">Thank you for shopping with LocalBasket. Your order has been confirmed and will be delivered soon.</p>

      <div class="ty-pill-row">
        <span class="ty-pill">Order Confirmed</span>
        <span class="ty-pill">Estimated Delivery Soon</span>
      </div>

      <div id="deliveryOtpWrap" style="display:none; margin:18px auto 0; max-width:420px;">
        <div style="background:#f8fffe; border:1px dashed #c7ebe4; border-radius:18px; padding:14px 14px 12px; text-align:left;">
          <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;">
            <div>
              <div style="font-size:12px; font-weight:800; letter-spacing:.4px; color:#0f766e; text-transform:uppercase;">Delivery OTP</div>
              <div id="deliveryOtpValue" style="font-size:26px; font-weight:900; letter-spacing:6px; color:#0f172a; margin-top:4px;">----</div>
            </div>
            <button id="deliveryOtpCopy" class="ty-btn ghost" type="button" style="padding:10px 14px; border-radius:12px;">Copy OTP</button>
          </div>
          <div style="margin-top:10px; font-size:12px; color:var(--ty-muted); line-height:1.5;">
            Share this OTP only when the seller marks your order as delivered.
          </div>
        </div>
      </div>

      <div class="ty-actions">
        <a class="ty-btn primary" href="./welcome/customer/index.html">Continue Shopping</a>
        <a class="ty-btn ghost" href="./welcome/customer/order/customer-orders.html">View My Orders</a>
      </div>
    </section>
  </main>

  <div id="siteFooter"></div>

  <div id="footer"></div>
  <script src="/js/include.js?v=20260313a"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/theme.js"></script>
  <script>
    (function () {
      var raw = null;
      try { raw = sessionStorage.getItem("lb_last_order"); } catch (e) {}
      if (!raw) return;

      var last = null;
      try { last = JSON.parse(raw); } catch (e) { last = null; }
      var otp = last && last.delivery_otp ? String(last.delivery_otp).replace(/\\D/g, "") : "";
      if (otp.length !== 4) return;

      var wrap = document.getElementById("deliveryOtpWrap");
      var value = document.getElementById("deliveryOtpValue");
      var copyBtn = document.getElementById("deliveryOtpCopy");
      if (!wrap || !value) return;

      wrap.style.display = "block";
      value.textContent = otp;

      if (copyBtn) {
        copyBtn.addEventListener("click", function () {
          try {
            navigator.clipboard.writeText(otp);
            copyBtn.textContent = "Copied";
            setTimeout(function(){ copyBtn.textContent = "Copy OTP"; }, 1200);
          } catch (e) {
            window.prompt("Copy OTP:", otp);
          }
        });
      }

      try { sessionStorage.removeItem("lb_last_order"); } catch (e) {}
    })();
  </script>
</body>
</html>
