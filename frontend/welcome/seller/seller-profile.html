   <style>
    /* Profile Specific Styling */
    .profile-container {
      max-width: 800px;
      margin: 20px auto;
    }
    .profile-header-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 30px;
      text-align: center;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      margin-bottom: 25px;
      position: relative;
      overflow: hidden;
    }
    .profile-header-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 100px;
      background: linear-gradient(90deg, var(--lav), var(--lav-2));
      z-index: 0;
    }
    .profile-img-wrapper {
      position: relative;
      z-index: 1;
      margin-top: 20px;
    }
    .profile-img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 5px solid var(--card);
      object-fit: cover;
      box-shadow: var(--shadow-sm);
      background: #eee;
    }
    .upload-btn-wrapper {
      margin-top: 15px;
    }
    .form-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 30px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
    }
    .form-section-title {
      grid-column: span 2;
      margin: 6px 0 2px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-light);
      font-weight: 700;
    }
    .section-divider {
      grid-column: span 2;
      height: 1px;
      background: var(--border-color);
      margin: 2px 0 6px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-light);
    }
    input, textarea {
      width: 100%;
      padding: 12px 15px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      transition: 0.3s;
    }
    input:focus, textarea:focus {
      border-color: var(--lav);
      outline: none;
      box-shadow: 0 0 0 3px var(--lav-soft);
    }
    .full-width { grid-column: span 2; }

    @media (max-width: 768px) {
      .form-grid { grid-template-columns: 1fr; }
      .full-width { grid-column: span 1; }
    }
  
    /* Enhanced UI overrides */
    .profile-container { max-width: 980px; margin: 24px auto 40px; }
    .profile-header-card { padding: 28px; box-shadow: var(--shadow-md); }
    .profile-header-card::before { background: linear-gradient(120deg, rgba(255,138,26,0.95), rgba(255,179,71,0.85)); }
    .profile-header-card::after {
      content: ""; position: absolute; inset: auto -10% -35% auto; width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(255,255,255,0.35), transparent 65%); opacity: 0.7; pointer-events: none;
    }
    .profile-img { box-shadow: 0 18px 36px -24px rgba(15, 23, 42, 0.45); }
    .upload-btn-wrapper { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .form-card { box-shadow: var(--shadow-md); }
    .form-card .btn-accept { box-shadow: 0 16px 30px -18px rgba(16, 185, 129, 0.7); }
    .form-group label { color: var(--text); }
    input, textarea { border-radius: 12px; background: #fff; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.02); }
    @media (max-width: 768px) {
      .profile-container { padding: 0 10px; }
      .profile-header-card { padding: 22px; }
    }


    .btn-photo {

    }
    .profile-quick {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .quick-pill {
      display: inline-flex;
      align-items: center;

      padding: 6px 10px;
      border-radius: 999px;

    @media (max-width: 768px) {

    .section-card {

    .profile-tabs {
      display: none;
      gap: 10px;
      margin-bottom: 12px;
    }
    .tab-btn {
      flex: 1;

    /* Mobile compact layout */
    @media (max-width: 640px) {
      .profile-container { margin: 14px auto 24px; padding: 0 8px; }

      .form-card { padding: 16px; border-radius: 16px; }

      .form-section-title { font-size: 11px; margin-bottom: 8px; }

      .top-bar h3 { font-size: 16px; }
      .top-bar .badge { font-size: 10px; padding: 4px 8px; }
    }

    /* Small mobile: stack labels over inputs for readability */
    @media (max-width: 520px) {

<script>
document.addEventListener("DOMContentLoaded", () => {
  /* AUTH CHECK */
  const seller = JSON.parse(localStorage.getItem("lbSeller"));
  const sellerToken = String(seller?.token || localStorage.getItem("lbSellerToken") || "").trim();
  const authFetch = (url, options = {}) => {
    const headers = new Headers(options.headers || {});
    if (sellerToken && !headers.has("Authorization") && /\/api\/seller(\/|$)/.test(String(url || ""))) {
      headers.set("Authorization", `Bearer ${sellerToken}`);
    }
    return fetch(url, { ...options, headers });
  };
  if(!seller) { location.href = "/welcome/seller/seller-auth/seller-auth.html"; return; }
  const initProfileTabs = () => {
    const tabs = document.querySelectorAll(".profile-tabs .tab-btn");
    const store = document.getElementById("storeSection");
    const bank = document.getElementById("bankSection");
    if (!tabs.length || !store || !bank) return;
    const activate = (target) => {
      tabs.forEach(btn => btn.classList.toggle("active", btn.dataset.target === target));
      store.classList.toggle("active", target === "storeSection");
      bank.classList.toggle("active", target === "bankSection");
      store.style.display = target === "storeSection" ? "block" : "none";
      bank.style.display = target === "bankSection" ? "block" : "none";
    };
    tabs.forEach(btn => btn.addEventListener("click", () => activate(btn.dataset.target)));
    activate("storeSection");
  };
  initProfileTabs();
  const resolveUploadUrl = (rawPath) => {
    const input = String(rawPath || "").trim();
    if (!input) return "";
    if (/^(https?:)?\/\//i.test(input) || input.startsWith("data:") || input.startsWith("blob:")) {
      return input;
    }
    let path = input.replace(/\\/g, "/").trim();
    if (path.startsWith("/uploads/")) path = path.slice("/uploads/".length);
    else if (path.startsWith("uploads/")) path = path.slice("uploads/".length);
    else if (path.startsWith("/")) return `${window.location.origin}${path}`;
    return `${window.API_BASE_URL}/uploads/${encodeURI(path.replace(/^\/+/, ""))}`;
  };

  /* ELEMENTS */
  const previewPic = document.getElementById("previewPic");
  const storeImageInput = document.getElementById("storeImageInput");
  const removeImageBtn = document.getElementById("removeImageBtn");
  const ownerName = document.getElementById("ownerName");
  const storeName = document.getElementById("storeName");
  const phone = document.getElementById("phone");
  const address = document.getElementById("address");
  const email = document.getElementById("email");
  const minimumOrder = document.getElementById("minimumOrder");
  const bankHolder = document.getElementById("bankHolder");
  const bankAccount = document.getElementById("bankAccount");
  const bankName = document.getElementById("bankName");
  const bankIfsc = document.getElementById("bankIfsc");
  const bankBranch = document.getElementById("bankBranch");
  const profileForm = document.getElementById("profileForm");
  const saveProfileBtn = document.getElementById("saveProfileBtn");
  const profileStatus = document.getElementById("profileStatus");

  /* FILL DATA */
  ownerName.value = seller.owner_name || "";
  storeName.value = seller.store_name || "";
  phone.value = seller.phone || "";
  address.value = seller.address || "";
  email.value = seller.email || "";
  minimumOrder.value = Number(seller.minimum_order || 100);
  if (bankHolder) bankHolder.value = seller.bank_holder || "";
  if (bankAccount) bankAccount.value = seller.bank_account || "";
  if (bankName) bankName.value = seller.bank_name || "";
  if (bankIfsc) bankIfsc.value = seller.bank_ifsc || "";
  if (bankBranch) bankBranch.value = seller.bank_branch || "";
  
  document.getElementById("displayStoreName").innerText = seller.store_name || "My Store";
  document.getElementById("displayOwner").innerText = seller.owner_name || "Owner";
  const sellerIdPill = document.getElementById("sellerIdPill");
  if (sellerIdPill) sellerIdPill.innerHTML = `<i class="fas fa-hashtag"></i> ID: #${seller.id || "---"}`;

  previewPic.src = seller.store_photo 
    ? resolveUploadUrl(seller.store_photo)
    : "https://cdn-icons-png.flaticon.com/512/9131/9131529.png";

  /* IMAGE PREVIEW */
  storeImageInput.onchange = e => {
    if(e.target.files[0]) previewPic.src = URL.createObjectURL(e.target.files[0]);
  };

  /* SAVE PROFILE */
  profileForm.onsubmit = async e => {
    e.preventDefault();
    if (profileStatus) profileStatus.textContent = "";
    const fd = new FormData();
    fd.append("seller_id", seller.id);
    fd.append("owner_name", ownerName.value.trim());
    fd.append("store_name", storeName.value.trim());
    fd.append("phone", phone.value.trim());
    if (email.value.trim()) fd.append("email", email.value.trim());
    fd.append("address", address.value.trim());
    if (bankHolder && bankHolder.value.trim()) fd.append("bank_holder", bankHolder.value.trim());
    if (bankAccount && bankAccount.value.trim()) fd.append("bank_account", bankAccount.value.trim());
    if (bankName && bankName.value.trim()) fd.append("bank_name", bankName.value.trim());
    if (bankIfsc && bankIfsc.value.trim()) fd.append("bank_ifsc", bankIfsc.value.trim());
    if (bankBranch && bankBranch.value.trim()) fd.append("bank_branch", bankBranch.value.trim());
    fd.append("minimum_order", minimumOrder.value || "0");
    if(storeImageInput.files[0]) fd.append("store_photo", storeImageInput.files[0]);

    try {
      if (saveProfileBtn) {
        saveProfileBtn.disabled = true;
        saveProfileBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Saving...`;
      }
      const res = await authFetch(`${window.API_BASE_URL}/api/seller/update-profile`, { method:"POST", body:fd });
      const data = await res.json().catch(() => null);
      if(data && data.success) {
        Object.assign(seller, {
          owner_name: ownerName.value.trim(),
          store_name: storeName.value.trim(),
          phone: phone.value.trim(),
          email: data.email || email.value.trim(),
          address: address.value.trim(),
          store_photo: data.store_photo || seller.store_photo,
          minimum_order: Number(data.minimum_order || minimumOrder.value || 100),
          bank_holder: bankHolder ? bankHolder.value.trim() : seller.bank_holder,
          bank_account: bankAccount ? bankAccount.value.trim() : seller.bank_account,
          bank_name: bankName ? bankName.value.trim() : seller.bank_name,
          bank_ifsc: bankIfsc ? bankIfsc.value.trim().toUpperCase() : seller.bank_ifsc,
          bank_branch: bankBranch ? bankBranch.value.trim() : seller.bank_branch
        });
        localStorage.setItem("lbSeller", JSON.stringify(seller));
        document.getElementById("displayStoreName").innerText = seller.store_name || "My Store";
        document.getElementById("displayOwner").innerText = seller.owner_name || "Owner";
        if (profileStatus) {
          profileStatus.style.color = "var(--green)";
          profileStatus.textContent = "Profile updated successfully.";
        }
      } else {
        const msg = (data && data.message) ? data.message : "Update failed";
        if (profileStatus) {
          profileStatus.style.color = "var(--red)";
          profileStatus.textContent = msg;
        } else {
          alert(msg);
        }
      }
    } catch(err) {
      const msg = err?.message || "Update failed!";
      if (profileStatus) {
        profileStatus.style.color = "var(--red)";
        profileStatus.textContent = msg;
      } else {
        alert(msg);
      }
    }
    finally {
      if (saveProfileBtn) {
        saveProfileBtn.disabled = false;
        saveProfileBtn.innerHTML = `<i class="fas fa-save"></i> Save Profile Changes`;
      }
    }
  };

  /* REMOVE IMAGE */
  removeImageBtn.onclick = async () => {
    const ok = await window.lbConfirm("Remove store image?");
    if(!ok) return;
    try {
      const res = await authFetch(`${window.API_BASE_URL}/api/seller/remove-store-image`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ seller_id:seller.id })
      });
      const data = await res.json();
      if(data.success) {
        previewPic.src = "https://cdn-icons-png.flaticon.com/512/9131/9131529.png";
        seller.store_photo = null;
        localStorage.setItem("lbSeller", JSON.stringify(seller));
      }
    } catch(err) { alert("Error removing image"); }
  };
});

/* THEME & NAV */
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("sidebarOverlay");
menuBtn.onclick = () => { sidebar.classList.add("open"); overlay.style.display="block"; }
overlay.onclick = () => { sidebar.classList.remove("open"); overlay.style.display="none"; }

const themeToggle = document.getElementById("themeToggle");
themeToggle.onchange = () => {
  document.body.classList.toggle('dark', themeToggle.checked);
  localStorage.setItem('theme', themeToggle.checked ? 'dark' : 'light');
};
if(localStorage.getItem('theme') === 'dark') { themeToggle.checked = true; document.body.classList.add('dark'); }

function go(p){ location.href=p }
function logout(){ localStorage.removeItem("lbSeller"); localStorage.removeItem("lbSellerToken"); location.href = "/welcome/seller/seller-auth/seller-auth.html"; }
